<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Langton's Ant Simulator</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #1e1e2e 0%, #2a2a3e 100%);
            color: #fff;
            padding: 20px;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            display: grid;
            grid-template-columns: 1fr 300px;
            gap: 20px;
        }

        .main {
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        h1 {
            text-align: center;
            font-size: 2em;
            margin-bottom: 10px;
            background: linear-gradient(45deg, #00d4ff, #0099ff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .canvas-container {
            background: #0a0a0f;
            border: 2px solid #00d4ff;
            border-radius: 8px;
            padding: 10px;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 600px;
            box-shadow: 0 0 20px rgba(0, 212, 255, 0.3);
        }

        #canvas {
            border: 1px solid #333;
            background: white;
            border-radius: 4px;
            cursor: crosshair;
        }

        .controls {
            background: #1a1a2e;
            border: 1px solid #00d4ff;
            border-radius: 8px;
            padding: 20px;
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
            justify-content: center;
            box-shadow: 0 0 15px rgba(0, 212, 255, 0.2);
        }

        button {
            padding: 10px 20px;
            font-size: 14px;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-weight: bold;
            transition: all 0.3s ease;
            background: #00d4ff;
            color: #0a0a0f;
        }

        button:hover {
            background: #00f0ff;
            transform: scale(1.05);
            box-shadow: 0 0 10px rgba(0, 212, 255, 0.5);
        }

        button:disabled {
            background: #666;
            cursor: not-allowed;
            opacity: 0.5;
        }

        .sidebar {
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        .panel {
            background: #1a1a2e;
            border: 1px solid #00d4ff;
            border-radius: 8px;
            padding: 20px;
            box-shadow: 0 0 15px rgba(0, 212, 255, 0.2);
        }

        .panel h3 {
            margin-bottom: 15px;
            color: #00d4ff;
            font-size: 1.1em;
            border-bottom: 1px solid #00d4ff;
            padding-bottom: 10px;
        }

        .param-group {
            margin-bottom: 15px;
        }

        .param-group label {
            display: block;
            font-size: 12px;
            color: #aaa;
            margin-bottom: 5px;
            text-transform: uppercase;
        }

        .param-group input[type="range"] {
            width: 100%;
            cursor: pointer;
        }

        .param-group input[type="number"],
        .param-group select {
            width: 100%;
            padding: 8px;
            background: #0a0a0f;
            border: 1px solid #00d4ff;
            color: #00d4ff;
            border-radius: 4px;
            font-size: 12px;
        }

        .stat {
            display: flex;
            justify-content: space-between;
            font-size: 13px;
            padding: 8px 0;
            border-bottom: 1px solid #333;
        }

        .stat:last-child {
            border-bottom: none;
        }

        .stat-value {
            color: #00d4ff;
            font-weight: bold;
        }

        .status {
            text-align: center;
            padding: 10px;
            background: #0a0a0f;
            border-radius: 4px;
            font-size: 12px;
            color: #aaa;
        }

        .status.running {
            color: #00ff00;
        }

        .status.error {
            color: #ff0000;
        }

        @media (max-width: 900px) {
            .container {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="main">
            <h1>🐜 Langton's Ant Simulator</h1>

            <div class="canvas-container">
                <canvas id="canvas" width="500" height="500"></canvas>
            </div>

            <div class="controls">
                <button id="playBtn" onclick="play()">▶ Play</button>
                <button id="pauseBtn" onclick="pause()" disabled>⏸ Pause</button>
                <button id="stopBtn" onclick="stop()">⏹ Stop</button>
                <button id="resetBtn" onclick="reset()">↻ Reset</button>
            </div>
        </div>

        <div class="sidebar">
            <div class="panel">
                <h3>Parameters</h3>

                <div class="param-group">
                    <label for="gridSize">Grid Size</label>
                    <input type="range" id="gridSize" min="50" max="500" value="200" step="50"
                           onchange="updateParam('gridSize', this.value)">
                    <small id="gridSizeLabel">200 × 200</small>
                </div>

                <div class="param-group">
                    <label for="numAnts">Number of Ants</label>
                    <input type="range" id="numAnts" min="1" max="100" value="5" step="1"
                           onchange="updateParam('numAnts', this.value)">
                    <small id="numAntsLabel">5 ants</small>
                </div>

                <div class="param-group">
                    <label for="speed">Animation Speed</label>
                    <input type="range" id="speed" min="1" max="100" value="10" step="1"
                           onchange="updateParam('speed', this.value)">
                    <small id="speedLabel">10x</small>
                </div>

                <div class="param-group">
                    <label for="algorithm">Algorithm</label>
                    <select id="algorithm" onchange="updateParam('algorithm', this.value)">
                        <option value="sequential">Sequential</option>
                        <option value="mpi_1">MPI (1 proc)</option>
                        <option value="mpi_2">MPI (2 procs)</option>
                        <option value="mpi_4">MPI (4 procs)</option>
                    </select>
                </div>
            </div>

            <div class="panel">
                <h3>Statistics</h3>

                <div class="stat">
                    <span>Step:</span>
                    <span class="stat-value" id="stepStat">0</span>
                </div>

                <div class="stat">
                    <span>Ants Alive:</span>
                    <span class="stat-value" id="antsStat">0</span>
                </div>

                <div class="stat">
                    <span>Black Cells:</span>
                    <span class="stat-value" id="blackStat">0</span>
                </div>

                <div class="stat">
                    <span>FPS:</span>
                    <span class="stat-value" id="fpsStat">0</span>
                </div>

                <div class="stat">
                    <span>Time:</span>
                    <span class="stat-value" id="timeStat">0s</span>
                </div>
            </div>

            <div class="panel">
                <h3>Status</h3>
                <div class="status" id="status">Ready</div>
            </div>
        </div>
    </div>

    <script src="app.js"></script>
</body>
</html>
